default_language_version:
  python: python3

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: mixed-line-ending

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        name: ruff (lint)
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        name: ruff (format)
        files: ^backend/

  - repo: local
    hooks:
      - id: pyright
        name: pyright (backend)
        entry: uv run --project backend pyright
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

      - id: import-linter
        name: import-linter (backend)
        entry: uv run --project backend lint-imports --config backend/pyproject.toml
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

      - id: eslint
        name: eslint (frontend)
        entry: npm --prefix frontend run lint
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false
