name: Test template

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dev dependencies
        run: uv sync

      - name: Run template smoke tests
        run: uv run pytest -m "not slow"

      - name: Run full generation + toolchain tests
        run: uv run pytest -m slow
